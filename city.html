<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>CATBOY CITY — 3D (preview)</title>
  <meta name="description" content="Fly through Catboy City — a living 3D neon Solana metropolis. Click a tower to enter." />
  <link rel="icon" type="image/png" href="assets/solana.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05030c; overflow: hidden; font-family: "Rajdhani", sans-serif; color: #fff; }
    #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
    .ui { position: fixed; z-index: 5; pointer-events: none; }
    #title { top: 22px; left: 0; right: 0; text-align: center; }
    #title h1 { font-family: "Orbitron", sans-serif; font-weight: 900; font-size: clamp(1.4rem, 4.5vw, 2.4rem);
      background: linear-gradient(100deg, #19e0ff, #fff 45%, #ff3df0, #9b4dff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(155,77,255,.5)); letter-spacing: .05em; }
    #title p { color: #b9b2cf; font-size: .95rem; letter-spacing: .18em; text-transform: uppercase; margin-top: .3rem; }
    #hover { bottom: 92px; left: 0; right: 0; text-align: center; font-family: "Orbitron", sans-serif; font-weight: 700;
      font-size: 1.3rem; letter-spacing: .1em; opacity: 0; transition: opacity .2s; text-shadow: 0 0 16px currentColor; }
    #bar { position: fixed; z-index: 6; bottom: 22px; left: 0; right: 0; text-align: center; }
    #bar a, #bar button { pointer-events: auto; display: inline-block; font-family: "Orbitron", sans-serif; font-weight: 700; font-size: .72rem;
      letter-spacing: .12em; text-transform: uppercase; color: #cfd0ff; background: rgba(10,6,24,.6); border: 1px solid rgba(255,255,255,.18);
      padding: .55rem 1.1rem; border-radius: 999px; text-decoration: none; backdrop-filter: blur(8px); margin: 0 .25rem; cursor: pointer; transition: border-color .2s, color .2s; }
    #bar a:hover, #bar button:hover { border-color: #19e0ff; color: #fff; }
    #hint { bottom: 62px; left: 0; right: 0; text-align: center; color: #8a83a6; font-size: .8rem; letter-spacing: .14em; text-transform: uppercase; }
    #load { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center; background: #05030c; transition: opacity .8s; }
    #load.gone { opacity: 0; pointer-events: none; }
    #load .ring { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(155,77,255,.2); border-top-color: #19e0ff; animation: spin 1s linear infinite; }
    #load p { position: absolute; bottom: 38%; font-family: "Orbitron", sans-serif; letter-spacing: .2em; color: #9b8fd6; font-size: .8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #fallback { position: fixed; inset: 0; z-index: 20; display: none; place-items: center; text-align: center; padding: 2rem; background: #05030c; }
    #fallback a { color: #19e0ff; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="load"><div class="ring"></div><p>ENTERING CATBOY CITY…</p></div>
  <div class="ui" id="title"><h1>CATBOY CITY</h1><p>Click a tower to enter · drag to look</p></div>
  <div class="ui" id="hover"></div>
  <div class="ui" id="hint">Drag to orbit · scroll / pinch to zoom</div>
  <div id="bar"><button id="streetBtn" type="button">Street view</button><a href="index.html">Enter classic site &rsaquo;</a></div>
  <div id="fallback"><div><h1 style="font-family:Orbitron">3D not supported here</h1><p style="margin:1rem 0">Your device/browser couldn't start WebGL.</p><a href="index.html">Enter the classic site &rsaquo;</a></div></div>

  <script type="importmap">
    { "imports": { "three": "./assets/vendor/three.module.js" } }
  </script>
  <script type="module">
    const fail = (e) => { console.error(e); document.getElementById("fallback").style.display = "grid"; document.getElementById("load").classList.add("gone"); };
    let THREE, OrbitControls, EffectComposer, RenderPass, UnrealBloomPass, Reflector;
    try {
      THREE = await import("three");
      ({ OrbitControls } = await import("./assets/vendor/jsm/controls/OrbitControls.js"));
      ({ EffectComposer } = await import("./assets/vendor/jsm/postprocessing/EffectComposer.js"));
      ({ RenderPass } = await import("./assets/vendor/jsm/postprocessing/RenderPass.js"));
      ({ UnrealBloomPass } = await import("./assets/vendor/jsm/postprocessing/UnrealBloomPass.js"));
      ({ Reflector } = await import("./assets/vendor/jsm/objects/Reflector.js"));
    } catch (e) { fail(e); }

    if (THREE) try {
      const NAV = [
        { name: "LAUNCH",   sub: "pump.fun", url: "launch.html",  color: 0x2ed573 },
        { name: "TERMINAL", sub: "trade",    url: "trench.html",  color: 0x19e0ff },
        { name: "CASINO",   sub: "burn",     url: "casino.html",  color: 0xff3df0 },
        { name: "ARCADE",   sub: "play",     url: "arcade.html",  color: 0xffd84d },
        { name: "NFTS",     sub: "collect",  url: "nft.html",     color: 0x9b4dff },
        { name: "THE DEN",  sub: "club",     url: "club.html",    color: 0xe8c45a },
        { name: "MERCH",    sub: "shop",     url: "merch.html",   color: 0x19e0ff },
        { name: "WALLET",   sub: "connect",  url: "wallet.html",  color: 0x7fd4ff },
      ];
      const tints = ["#9945ff", "#14f195", "#19e0ff", "#a86bff", "#00e0a8"]; // Solana Tron palette

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x07040f);
      scene.fog = new THREE.FogExp2(0x0a0618, 0.0085);

      const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 600);
      camera.position.set(0, 48, 104);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.dampingFactor = 0.06;
      controls.maxPolarAngle = Math.PI * 0.49; controls.minDistance = 4; controls.maxDistance = 190;
      controls.autoRotate = true; controls.autoRotateSpeed = 0.45;
      controls.target.set(0, 16, 0);

      scene.add(new THREE.AmbientLight(0x4a3b7a, 1.0));
      const key = new THREE.DirectionalLight(0x9b4dff, 0.7); key.position.set(20, 60, 20); scene.add(key);
      const fillA = new THREE.PointLight(0x19e0ff, 1.1, 240); fillA.position.set(-40, 34, -10); scene.add(fillA);
      const fillB = new THREE.PointLight(0x14f195, 0.9, 240); fillB.position.set(40, 26, 30); scene.add(fillB);
      const lightning = new THREE.PointLight(0xbfe0ff, 0, 400); lightning.position.set(0, 130, 0); scene.add(lightning);

      // wet reflective street
      const mirror = new Reflector(new THREE.PlaneGeometry(900, 900), {
        textureWidth: 1024, textureHeight: 1024, color: 0x46435e,
      });
      mirror.rotation.x = -Math.PI / 2; mirror.position.y = 0.01; scene.add(mirror);

      // --- street grid: asphalt roads, lane lines, sidewalks, crosswalks ---
      const ROADW = 15, SIDEW = 5, EXT = 174;
      const ROADS = []; for (let k = -4; k <= 4; k++) ROADS.push(k * 36);
      function roadTexture() {
        const S = 2048, cv = document.createElement("canvas"); cv.width = cv.height = S; const x = cv.getContext("2d");
        const p2 = S / (2 * EXT), c = (v) => (v + EXT) * p2;
        const RW = ROADW * p2, SW = SIDEW * p2;
        x.fillStyle = "#0c0b14"; x.fillRect(0, 0, S, S);              // base pavement
        // block pavement squares (subtle) between roads
        x.fillStyle = "#14121e";
        for (let a = -3; a <= 3; a++) for (let b = -3; b <= 3; b++) { const bx = c(a * 36 + 18), by = c(b * 36 + 18); x.fillRect(bx - RW * 0.7, by - RW * 0.7, RW * 1.4, RW * 1.4); }
        function road(horizontal, at) {
          const q = c(at);
          if (horizontal) {
            x.fillStyle = "#1c1a28"; x.fillRect(0, q - RW / 2 - SW, S, SW); x.fillRect(0, q + RW / 2, S, SW);      // sidewalks
            x.fillStyle = "#08070f"; x.fillRect(0, q - RW / 2, S, RW);                                            // asphalt
            x.fillStyle = "rgba(220,225,255,0.45)"; x.fillRect(0, q - RW / 2 + 3, S, 2.5); x.fillRect(0, q + RW / 2 - 5, S, 2.5); // edge lines
            x.fillStyle = "rgba(255,205,70,0.85)"; for (let px = 0; px < S; px += 46) x.fillRect(px, q - 2, 26, 4); // dashed center
          } else {
            x.fillStyle = "#1c1a28"; x.fillRect(q - RW / 2 - SW, 0, SW, S); x.fillRect(q + RW / 2, 0, SW, S);
            x.fillStyle = "#08070f"; x.fillRect(q - RW / 2, 0, RW, S);
            x.fillStyle = "rgba(220,225,255,0.45)"; x.fillRect(q - RW / 2 + 3, 0, 2.5, S); x.fillRect(q + RW / 2 - 5, 0, 2.5, S);
            x.fillStyle = "rgba(255,205,70,0.85)"; for (let py = 0; py < S; py += 46) x.fillRect(q - 2, py, 4, 26);
          }
        }
        ROADS.forEach((r) => { road(true, r); road(false, r); });
        // crosswalks at intersections
        x.fillStyle = "rgba(235,240,255,0.7)";
        ROADS.forEach((xc) => ROADS.forEach((zc) => { const xp = c(xc), yp = c(zc);
          for (let k = -3; k <= 3; k++) { x.fillRect(xp + k * 9 - 3, yp - RW / 2 - SW, 6, SW); x.fillRect(xp + k * 9 - 3, yp + RW / 2, 6, SW);
            x.fillRect(xp - RW / 2 - SW, yp + k * 9 - 3, SW, 6); x.fillRect(xp + RW / 2, yp + k * 9 - 3, SW, 6); }
        }));
        const tex = new THREE.CanvasTexture(cv); tex.colorSpace = THREE.SRGBColorSpace; tex.anisotropy = 8; return tex;
      }
      const streets = new THREE.Mesh(new THREE.PlaneGeometry(2 * EXT, 2 * EXT),
        new THREE.MeshStandardMaterial({ map: roadTexture(), metalness: 0.55, roughness: 0.5, transparent: true, opacity: 0.93 }));
      streets.rotation.x = -Math.PI / 2; streets.position.y = 0.04; scene.add(streets);
      // glowing Tron grid over the streets (Solana purple + teal)
      const tron = new THREE.GridHelper(2 * EXT, Math.round(2 * EXT / 12), 0x14f195, 0x9945ff);
      tron.material.transparent = true; tron.material.opacity = 0.32; tron.position.y = 0.07; scene.add(tron);

      // environment map so glass towers reflect the neon city
      const pmrem = new THREE.PMREMGenerator(renderer);
      (function () {
        const cv = document.createElement("canvas"); cv.width = 512; cv.height = 256; const x = cv.getContext("2d");
        const g = x.createLinearGradient(0, 0, 0, 256); g.addColorStop(0, "#0c0a26"); g.addColorStop(0.55, "#170b2e"); g.addColorStop(1, "#05030c");
        x.fillStyle = g; x.fillRect(0, 0, 512, 256);
        ["#19e0ff", "#ff3df0", "#9b4dff", "#ffd84d", "#7fd4ff"].forEach((c, i) => { x.fillStyle = c; x.globalAlpha = 0.22; x.beginPath(); x.ellipse(40 + i * 110, 170 + (i % 2) * 40, 90, 46, 0, 0, 7); x.fill(); });
        x.globalAlpha = 1;
        const tex = new THREE.CanvasTexture(cv); tex.mapping = THREE.EquirectangularReflectionMapping;
        scene.environment = pmrem.fromEquirectangular(tex).texture; tex.dispose();
      })();

      // full-face facade texture: multi-colour lit windows, floor lines, storefront glow
      function facadeTex(tint) {
        const W = 128, H = 512, cv = document.createElement("canvas"); cv.width = W; cv.height = H; const x = cv.getContext("2d");
        x.fillStyle = "#05030e"; x.fillRect(0, 0, W, H);
        const cols = 6 + (Math.random() * 4 | 0), floors = 30 + (Math.random() * 14 | 0), cw = W / cols, fh = H / floors;
        const pal = tint ? [tint] : ["#9fe6ff", "#bfa8ff", "#7fd4ff", "#ffd9a0", "#ff9fe0", "#cfeaff"];
        for (let f = 0; f < floors; f++) {
          const ground = f >= floors - 2;             // bottom rows = warm storefronts
          const lit = ground || Math.random() < 0.72;
          for (let c = 0; c < cols; c++) {
            const on = ground || (lit && Math.random() < 0.62);
            x.fillStyle = on ? (ground ? "#ffce9a" : pal[(Math.random() * pal.length) | 0]) : "#0a0a16";
            x.globalAlpha = on ? 0.55 + Math.random() * 0.45 : 1;
            x.fillRect(c * cw + 1.3, f * fh + 1.3, cw - 2.6, fh - 2.6);
          }
          x.globalAlpha = 1; x.fillStyle = "rgba(0,0,0,0.45)"; x.fillRect(0, f * fh, W, 1);
        }
        x.fillStyle = "rgba(0,0,0,0.4)"; for (let c = 0; c <= cols; c++) x.fillRect(c * cw, 0, 1, H);
        return new THREE.CanvasTexture(cv);
      }
      const FAC = []; for (let i = 0; i < 10; i++) FAC.push(facadeTex());
      const winMats = FAC.map((t) => new THREE.MeshStandardMaterial({ color: 0x0c0820, map: t, emissive: 0xffffff, emissiveMap: t, emissiveIntensity: 0.85, metalness: 0.45, roughness: 0.55 }));
      const glassMats = [0x0a1430, 0x14082a, 0x0a1228].map((c, i) => new THREE.MeshStandardMaterial({ color: c, metalness: 1.0, roughness: 0.08, emissive: 0xffffff, emissiveMap: FAC[i], emissiveIntensity: 0.16 }));
      const trimMats = tints.map((c) => new THREE.MeshBasicMaterial({ color: c }));
      const unit = new THREE.BoxGeometry(1, 1, 1);
      // Tron neon edge outlines (shared geometry, reused per building section)
      const edgeGeo = new THREE.EdgesGeometry(unit);
      const edgeMats = ["#14f195", "#9945ff", "#19e0ff"].map((c) => new THREE.LineBasicMaterial({ color: c, transparent: true, opacity: 0.5 }));

      // photoreal PBR facades (nano-banana) with normal maps for real depth
      const texLoader = new THREE.TextureLoader();
      const loadTex = (url, srgb) => new Promise((res) => texLoader.load(url, (t) => { t.colorSpace = srgb ? THREE.SRGBColorSpace : THREE.NoColorSpace; t.wrapS = t.wrapT = THREE.RepeatWrapping; res(t); }, undefined, () => res(null)));
      const FACN = ["fac1", "fac2", "fac3"];
      const albs = await Promise.all(FACN.map((f) => loadTex("assets/city/" + f + ".jpg", true)));
      const nrms = await Promise.all(FACN.map((f) => loadTex("assets/city/" + f + "_n.jpg", false)));
      const BR = [2.0, 3.2, 4.6]; // vertical tiling per height bucket
      const pbrSets = albs.map((alb, f) => !alb ? null : BR.map((ry) => {
        const a = alb.clone(); a.repeat.set(1.4, ry); a.needsUpdate = true;
        let n = null; if (nrms[f]) { n = nrms[f].clone(); n.repeat.set(1.4, ry); n.needsUpdate = true; }
        return new THREE.MeshStandardMaterial({ map: a, emissive: 0xffffff, emissiveMap: a, emissiveIntensity: 0.3, normalMap: n || undefined, normalScale: new THREE.Vector2(0.85, 0.85), metalness: 0.4, roughness: 0.72 });
      })).filter(Boolean);
      const havePBR = pbrSets.length > 0;

      function makeBuilding(px, pz, w, d, h) {
        const g = new THREE.Group();
        const sections = 1 + (Math.random() < 0.5 ? 1 : 0) + (Math.random() < 0.2 ? 1 : 0);
        const fset = havePBR ? pbrSets[(Math.random() * pbrSets.length) | 0] : null;
        const trim = trimMats[(Math.random() * trimMats.length) | 0];
        let y = 0, cw = w, cd = d, hLeft = h;
        for (let s = 0; s < sections; s++) {
          const sh = s === sections - 1 ? hLeft : hLeft * (0.45 + Math.random() * 0.2); hLeft -= sh;
          const mat = fset ? fset[sh < 14 ? 0 : sh < 26 ? 1 : 2] : winMats[(Math.random() * winMats.length) | 0];
          const box = new THREE.Mesh(unit, mat); box.scale.set(cw, sh, cd); box.position.set(px, y + sh / 2, pz); g.add(box);
          const eg = new THREE.LineSegments(edgeGeo, edgeMats[(Math.random() * edgeMats.length) | 0]); eg.scale.set(cw, sh, cd); eg.position.set(px, y + sh / 2, pz); g.add(eg); // Tron edges
          const t = new THREE.Mesh(unit, trim); t.scale.set(cw * 1.04, 0.5, cd * 1.04); t.position.set(px, y + sh, pz); g.add(t);
          y += sh; cw *= 0.66 + Math.random() * 0.08; cd *= 0.66 + Math.random() * 0.08;
        }
        if (Math.random() < 0.45) {
          const ah = 3 + Math.random() * 7;
          const ant = new THREE.Mesh(unit, new THREE.MeshBasicMaterial({ color: 0x20202a })); ant.scale.set(0.3, ah, 0.3); ant.position.set(px, y + ah / 2, pz); g.add(ant);
          const beac = new THREE.Mesh(unit, trim); beac.scale.set(0.7, 0.7, 0.7); beac.position.set(px, y + ah, pz); g.add(beac);
        }
        scene.add(g);
      }

      const STEP = 12, SPAN = 14, ROAD_HALF = EXT;
      for (let i = -SPAN; i <= SPAN; i++) for (let j = -SPAN; j <= SPAN; j++) {
        if (i % 3 === 0 || j % 3 === 0) continue;      // leave the road lanes clear
        const r = Math.hypot(i, j);
        if (r < 3.0) continue;                          // central plaza
        if (Math.random() < 0.14) continue;
        const h = 7 + Math.random() * (r > 8 ? 34 : 16);
        const w = 5 + Math.random() * 3.5, d = 5 + Math.random() * 3.5;
        makeBuilding(i * STEP + (Math.random() - 0.5) * 1.5, j * STEP + (Math.random() - 0.5) * 1.5, w, d, h);
      }

      function roundRect(x, a, b, w, h, r) { x.beginPath(); x.moveTo(a + r, b); x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r); x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath(); }
      function makeSign(text, sub, colorHex, sc) {
        const cv = document.createElement("canvas"); cv.width = 512; cv.height = 160;
        const x = cv.getContext("2d"); x.clearRect(0, 0, 512, 160);
        const col = "#" + colorHex.toString(16).padStart(6, "0");
        x.fillStyle = "rgba(8,4,18,0.82)"; roundRect(x, 16, 16, 480, 128, 22); x.fill();
        x.lineWidth = 4; x.strokeStyle = col; x.shadowColor = col; x.shadowBlur = 26; roundRect(x, 16, 16, 480, 128, 22); x.stroke();
        x.shadowBlur = 18; x.fillStyle = "#fff"; x.textAlign = "center"; x.font = "900 62px Orbitron, sans-serif"; x.fillText(text, 256, 84);
        x.shadowBlur = 0; x.fillStyle = col; x.font = "600 26px Rajdhani, sans-serif"; x.fillText(sub.toUpperCase(), 256, 124);
        const tex = new THREE.CanvasTexture(cv);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
        sp.scale.set(sc || 16, (sc || 16) * 0.31, 1); return sp;
      }

      // landmark towers (nav)
      const clickable = [];
      NAV.forEach((n, k) => {
        const ang = (k / NAV.length) * Math.PI * 2, px = Math.cos(ang) * 30, pz = Math.sin(ang) * 30, h = 30 + (k % 3) * 6;
        const col = new THREE.Color(n.color);
        const tex = facadeTex("#" + n.color.toString(16).padStart(6, "0"));
        const mat = new THREE.MeshStandardMaterial({ color: 0x0b0820, map: tex, emissive: col, emissiveMap: tex, emissiveIntensity: 0.95, metalness: 0.6, roughness: 0.4 });
        const tower = new THREE.Mesh(new THREE.BoxGeometry(7, h, 7), mat);
        tower.position.set(px, h / 2, pz); tower.userData = { url: n.url, name: n.name, base: 0.9, mat };
        scene.add(tower); clickable.push(tower);
        const te = new THREE.LineSegments(edgeGeo, new THREE.LineBasicMaterial({ color: col, transparent: true, opacity: 0.7 })); te.scale.set(7, h, 7); te.position.set(px, h / 2, pz); scene.add(te);
        const cap = new THREE.Mesh(new THREE.BoxGeometry(7.4, 1.2, 7.4), new THREE.MeshBasicMaterial({ color: col })); cap.position.set(px, h + 0.6, pz); scene.add(cap);
        const sign = makeSign(n.name, n.sub, n.color); sign.position.set(px, h + 7, pz); scene.add(sign); tower.userData.sign = sign;
        const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 70, 6), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.22 })); beam.position.set(px, h + 35, pz); scene.add(beam);
      });

      // central beacon + Catboy hologram
      const beacon = new THREE.Mesh(new THREE.CylinderGeometry(3.2, 4.0, 46, 8),
        new THREE.MeshStandardMaterial({ color: 0x120a26, emissive: new THREE.Color(0x9b4dff), emissiveIntensity: 1.1, metalness: 0.7, roughness: 0.3 }));
      beacon.position.set(0, 23, 0); scene.add(beacon);
      const catSign = makeSign("$CATBOY", "the legend evolves", 0xff3df0, 22); catSign.position.set(0, 54, 0); scene.add(catSign);
      // hologram
      const holoTex = new THREE.TextureLoader().load("assets/catboy.png");
      const holo = new THREE.Sprite(new THREE.SpriteMaterial({ map: holoTex, transparent: true, opacity: 0.7, color: 0x9fe6ff, blending: THREE.AdditiveBlending, depthWrite: false }));
      holo.scale.set(14, 14, 1); holo.position.set(0, 12, 20); scene.add(holo);
      const holoBase = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 0.5, 24), new THREE.MeshBasicMaterial({ color: 0x19e0ff, transparent: true, opacity: 0.4 })); holoBase.position.set(0, 0.4, 20); scene.add(holoBase);
      const holoBeam = new THREE.Mesh(new THREE.ConeGeometry(5, 20, 24, 1, true), new THREE.MeshBasicMaterial({ color: 0x19e0ff, transparent: true, opacity: 0.06, side: THREE.DoubleSide })); holoBeam.position.set(0, 10, 20); scene.add(holoBeam);

      // stars
      const sv = []; for (let i = 0; i < 1200; i++) { const rr = 220 + Math.random() * 140, th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI * 0.5; sv.push(Math.cos(th) * rr, 50 + Math.sin(ph) * 160, Math.sin(th) * rr); }

      }
      // ATM queue — a short line waiting at the first kiosk
      const atm = KIOSK_POS[0], aL = Math.hypot(atm.x, atm.z), qd = { x: -atm.x / aL, z: -atm.z / aL };
      const queuePeds = [];
      for (let i = 0; i < 4; i++) { const g = makePlazaPed(); g.userData = { base: 2.6 + i * 1.25, ph: Math.random() * 6, i }; queuePeds.push(g); }
      function stepQueue(t) {
        queuePeds.forEach((p) => { const u = p.userData; const dist = u.base + Math.sin(t * 1.1 - u.i * 0.6) * 0.14;
          p.position.set(atm.x + qd.x * dist, Math.abs(Math.sin(t * 3 + u.ph)) * 0.05, atm.z + qd.z * dist); p.rotation.y = Math.atan2(-qd.x, -qd.z); });
      }

      // flying cars (air)
      const air = [];
      for (let i = 0; i < 14; i++) {
        const col = new THREE.Color(tints[(Math.random() * tints.length) | 0]);
        const c = new THREE.Mesh(carBody, new THREE.MeshBasicMaterial({ color: col })); c.scale.set(1.4, 0.3, 0.3);
        c.userData = { y: 14 + Math.random() * 28, rad: 50 + Math.random() * 90, sp: (0.2 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1), a: Math.random() * 6.28 };
        scene.add(c); air.push(c);
      }

      // rain
      const RN = 2400, rainGeo = new THREE.BufferGeometry(), rpos = new Float32Array(RN * 6), rspd = new Float32Array(RN);
      for (let i = 0; i < RN; i++) { const x = (Math.random() - 0.5) * 340, z = (Math.random() - 0.5) * 340, y = Math.random() * 160, len = 2.2 + Math.random() * 3.5; rpos[i * 6] = x; rpos[i * 6 + 1] = y; rpos[i * 6 + 2] = z; rpos[i * 6 + 3] = x; rpos[i * 6 + 4] = y - len; rpos[i * 6 + 5] = z; rspd[i] = 0.7 + Math.random() * 1.4; }
      rainGeo.setAttribute("position", new THREE.BufferAttribute(rpos, 3));
      const rain = new THREE.LineSegments(rainGeo, new THREE.LineBasicMaterial({ color: 0x8fe6ff, transparent: true, opacity: 0.26, blending: THREE.AdditiveBlending })); scene.add(rain);
      function stepRain(dt) { const p = rainGeo.attributes.position.array; for (let i = 0; i < RN; i++) { const d = rspd[i] * dt * 60; p[i * 6 + 1] -= d; p[i * 6 + 4] -= d; if (p[i * 6 + 4] < 0) { const ny = 120 + Math.random() * 40, len = p[i * 6 + 1] - p[i * 6 + 4]; p[i * 6 + 1] = ny; p[i * 6 + 4] = ny - len; } } rainGeo.attributes.position.needsUpdate = true; }

      // bloom
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.72, 0.62, 0.26); composer.addPass(bloom);

      // interaction (nav)
      const ray = new THREE.Raycaster(), pointer = new THREE.Vector2();
      let hovered = null; const hoverEl = document.getElementById("hover");
      const setPointer = (e) => { const t = e.touches ? e.touches[0] : e; pointer.x = (t.clientX / innerWidth) * 2 - 1; pointer.y = -(t.clientY / innerHeight) * 2 + 1; };
      const pick = () => { ray.setFromCamera(pointer, camera); const hit = ray.intersectObjects(clickable, false)[0]; return hit ? hit.object : null; };
      renderer.domElement.addEventListener("pointermove", setPointer);
      let downXY = null;
      renderer.domElement.addEventListener("pointerdown", (e) => { downXY = [e.clientX, e.clientY]; });
      renderer.domElement.addEventListener("pointerup", (e) => {
        if (!downXY) return; const moved = Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]); downXY = null;
        if (moved > 8) return; setPointer(e);
        const o = pick(); if (o) { document.getElementById("load").classList.remove("gone"); location.href = o.userData.url; return; }
        const pr = ray.intersectObjects(promoMeshes, false)[0]; if (pr) { document.getElementById("load").classList.remove("gone"); location.href = pr.object.userData.url; return; }
        const a = ray.intersectObjects(adMeshes, false)[0]; if (a) window.open(a.object.userData.url, "_blank");
      });

      // street view + WASD
      const kb = {};
      addEventListener("keydown", (e) => kb[e.key.toLowerCase()] = true);
      addEventListener("keyup", (e) => kb[e.key.toLowerCase()] = false);
      let street = false;
      document.getElementById("streetBtn").addEventListener("click", () => {
        street = !street;
        controls.autoRotate = !street;
        if (street) { camera.position.set(STEP * 1.6 + 2.2, 3.5, 72); controls.target.set(STEP * 1.6 + 2.2, 5, 0); controls.minDistance = 1; controls.maxPolarAngle = Math.PI * 0.62; document.querySelector("#hint").textContent = "WASD to walk · drag to look · scroll to zoom"; document.getElementById("streetBtn").textContent = "Sky view"; }
        else { camera.position.set(0, 48, 104); controls.target.set(0, 16, 0); controls.minDistance = 4; controls.maxPolarAngle = Math.PI * 0.49; document.querySelector("#hint").textContent = "Drag to orbit · scroll / pinch to zoom"; document.getElementById("streetBtn").textContent = "Street view"; }
      });
      const fwd = new THREE.Vector3(), rightV = new THREE.Vector3(), up = new THREE.Vector3(0, 1, 0), move = new THREE.Vector3();
      function walk() {
        move.set(0, 0, 0); camera.getWorldDirection(fwd); fwd.y = 0; fwd.normalize(); rightV.crossVectors(fwd, up).normalize();
        if (kb["w"] || kb["arrowup"]) move.add(fwd); if (kb["s"] || kb["arrowdown"]) move.sub(fwd);
        if (kb["d"] || kb["arrowright"]) move.add(rightV); if (kb["a"] || kb["arrowleft"]) move.sub(rightV);
        if (move.lengthSq() > 0) { move.normalize().multiplyScalar(0.9); camera.position.add(move); controls.target.add(move); const lim = ROAD_HALF; camera.position.x = Math.max(-lim, Math.min(lim, camera.position.x)); camera.position.z = Math.max(-lim, Math.min(lim, camera.position.z)); camera.position.y = 3.2; }
      }

      addEventListener("resize", () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight); });

      let last = performance.now(), lflash = 0, nextBolt = 3;
      function animate(now) {
        requestAnimationFrame(animate);
        const dt = Math.min(0.05, (now - last) / 1000); last = now; const t = now / 1000;
        if (street) walk();
        controls.update();
        // nav hover
        const o = pick();
        if (o !== hovered) {
          if (hovered) { hovered.userData.mat.emissiveIntensity = hovered.userData.base; hovered.userData.sign.scale.set(16, 5, 1); }
          hovered = o;
          if (hovered) { hoverEl.textContent = "Enter " + hovered.userData.name; hoverEl.style.color = "#" + hovered.material.emissive.getHexString(); hoverEl.style.opacity = 1; document.body.style.cursor = "pointer"; }
          else { hoverEl.style.opacity = 0; document.body.style.cursor = "default"; }
        }
        if (!hovered) { const bh = ray.intersectObjects(promoMeshes, false)[0] || ray.intersectObjects(adMeshes, false)[0]; document.body.style.cursor = bh ? "pointer" : "default"; }
        if (hovered) { hovered.userData.mat.emissiveIntensity = 1.4 + Math.sin(t * 6) * 0.3; hovered.userData.sign.scale.set(18, 5.6, 1); }
        // life
        stepVehicles(dt, t); stepPeds(dt, t); stepPlaza(dt, t); stepQueue(t); stepRain(dt); drawBillboards(t);
        faceCam.forEach((p) => { p.rotation.y = Math.atan2(camera.position.x - p.position.x, camera.position.z - p.position.z); });
        air.forEach((c) => { c.userData.a += c.userData.sp * 0.01; c.position.set(Math.cos(c.userData.a) * c.userData.rad, c.userData.y, Math.sin(c.userData.a) * c.userData.rad); c.rotation.y = -c.userData.a; });
        beacon.rotation.y = t * 0.2; holo.position.y = 12 + Math.sin(t * 1.5) * 0.6; holo.material.opacity = 0.6 + Math.sin(t * 8) * 0.08;
        // lightning
        nextBolt -= dt; if (nextBolt <= 0) { lflash = 1; nextBolt = 4 + Math.random() * 7; }
        if (lflash > 0) { lflash -= dt * 4; lightning.intensity = Math.max(0, lflash) * 60; renderer.toneMappingExposure = 1.15 + Math.max(0, lflash) * 0.5; } else { lightning.intensity = 0; renderer.toneMappingExposure = 1.15; }
        composer.render();
      }
      requestAnimationFrame(animate);
      setTimeout(() => document.getElementById("load").classList.add("gone"), 500);
    } catch (e) { fail(e); }
  </script>
</body>
</html>
