<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>CATBOY CITY — 3D (preview)</title>
  <meta name="description" content="Fly through Catboy City — a 3D neon Solana metropolis. Click a tower to enter." />
  <link rel="icon" type="image/png" href="assets/solana.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #05030c; overflow: hidden; font-family: "Rajdhani", sans-serif; color: #fff; }
    #c { display: block; width: 100vw; height: 100vh; touch-action: none; }
    .ui { position: fixed; z-index: 5; pointer-events: none; }
    #title { top: 22px; left: 0; right: 0; text-align: center; }
    #title h1 { font-family: "Orbitron", sans-serif; font-weight: 900; font-size: clamp(1.4rem, 4.5vw, 2.4rem);
      background: linear-gradient(100deg, #19e0ff, #fff 45%, #ff3df0, #9b4dff); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 18px rgba(155,77,255,.5)); letter-spacing: .05em; }
    #title p { color: #b9b2cf; font-size: .95rem; letter-spacing: .18em; text-transform: uppercase; margin-top: .3rem; }
    #hover { bottom: 86px; left: 0; right: 0; text-align: center; font-family: "Orbitron", sans-serif; font-weight: 700;
      font-size: 1.3rem; letter-spacing: .1em; opacity: 0; transition: opacity .2s; text-shadow: 0 0 16px currentColor; }
    #bar { bottom: 22px; left: 0; right: 0; text-align: center; pointer-events: none; }
    #bar a, #classic { pointer-events: auto; display: inline-block; font-family: "Orbitron", sans-serif; font-weight: 700; font-size: .72rem;
      letter-spacing: .12em; text-transform: uppercase; color: #cfd0ff; background: rgba(10,6,24,.6); border: 1px solid rgba(255,255,255,.18);
      padding: .55rem 1.1rem; border-radius: 999px; text-decoration: none; backdrop-filter: blur(8px); margin: 0 .25rem; transition: border-color .2s, color .2s; }
    #bar a:hover { border-color: #19e0ff; color: #fff; }
    #hint { bottom: 60px; left: 0; right: 0; text-align: center; color: #8a83a6; font-size: .8rem; letter-spacing: .14em; text-transform: uppercase; }
    #load { position: fixed; inset: 0; z-index: 10; display: grid; place-items: center; background: #05030c; transition: opacity .8s; }
    #load.gone { opacity: 0; pointer-events: none; }
    #load .ring { width: 64px; height: 64px; border-radius: 50%; border: 3px solid rgba(155,77,255,.2); border-top-color: #19e0ff; animation: spin 1s linear infinite; }
    #load p { position: absolute; bottom: 38%; font-family: "Orbitron", sans-serif; letter-spacing: .2em; color: #9b8fd6; font-size: .8rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #fallback { position: fixed; inset: 0; z-index: 20; display: none; place-items: center; text-align: center; padding: 2rem; background: #05030c; }
    #fallback a { color: #19e0ff; }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="load"><div class="ring"></div><p>ENTERING CATBOY CITY…</p></div>
  <div class="ui" id="title"><h1>CATBOY CITY</h1><p>Click a tower to enter · drag to look</p></div>
  <div class="ui" id="hover"></div>
  <div class="ui" id="hint">Drag to orbit · scroll / pinch to zoom</div>
  <div class="ui" id="bar"><a href="index.html" id="classic">Enter classic site &rsaquo;</a></div>
  <div id="fallback"><div><h1 style="font-family:Orbitron">3D not supported here</h1><p style="margin:1rem 0">Your device/browser couldn't start WebGL.</p><a href="index.html">Enter the classic site &rsaquo;</a></div></div>

  <script type="importmap">
    { "imports": { "three": "./assets/vendor/three.module.js" } }
  </script>
  <script type="module">
    const fail = (e) => { console.error(e); document.getElementById("fallback").style.display = "grid"; document.getElementById("load").classList.add("gone"); };
    let THREE, OrbitControls, EffectComposer, RenderPass, UnrealBloomPass, Reflector;
    try {
      THREE = await import("three");
      ({ OrbitControls } = await import("./assets/vendor/jsm/controls/OrbitControls.js"));
      ({ EffectComposer } = await import("./assets/vendor/jsm/postprocessing/EffectComposer.js"));
      ({ RenderPass } = await import("./assets/vendor/jsm/postprocessing/RenderPass.js"));
      ({ UnrealBloomPass } = await import("./assets/vendor/jsm/postprocessing/UnrealBloomPass.js"));
      ({ Reflector } = await import("./assets/vendor/jsm/objects/Reflector.js"));
    } catch (e) { fail(e); }

    if (THREE) try {
      const NAV = [
        { name: "LAUNCH",   sub: "pump.fun", url: "launch.html",  color: 0x2ed573 },
        { name: "TERMINAL", sub: "trade",    url: "trench.html",  color: 0x19e0ff },
        { name: "CASINO",   sub: "burn",     url: "casino.html",  color: 0xff3df0 },
        { name: "ARCADE",   sub: "play",     url: "arcade.html",  color: 0xffd84d },
        { name: "NFTS",     sub: "collect",  url: "nft.html",     color: 0x9b4dff },
        { name: "THE DEN",  sub: "club",     url: "club.html",    color: 0xe8c45a },
        { name: "MERCH",    sub: "shop",     url: "merch.html",   color: 0x19e0ff },
        { name: "WALLET",   sub: "connect",  url: "wallet.html",  color: 0x7fd4ff },
      ];

      const canvas = document.getElementById("c");
      const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.15;

      const scene = new THREE.Scene();
      scene.background = new THREE.Color(0x07040f);
      scene.fog = new THREE.FogExp2(0x0a0618, 0.0085);

      const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 500);
      camera.position.set(0, 48, 104);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true; controls.dampingFactor = 0.06;
      controls.maxPolarAngle = Math.PI * 0.49; controls.minDistance = 30; controls.maxDistance = 180;
      controls.autoRotate = true; controls.autoRotateSpeed = 0.45;
      controls.target.set(0, 16, 0);

      // lights
      scene.add(new THREE.AmbientLight(0x4a3b7a, 1.1));
      const key = new THREE.DirectionalLight(0x9b4dff, 0.8); key.position.set(20, 40, 20); scene.add(key);
      const fill = new THREE.PointLight(0x19e0ff, 1.2, 200); fill.position.set(-30, 30, -10); scene.add(fill);
      const fill2 = new THREE.PointLight(0xff3df0, 1.0, 200); fill2.position.set(30, 24, 30); scene.add(fill2);

      // wet reflective street (Reflector) — the "broke Matrix" look
      const mirror = new Reflector(new THREE.PlaneGeometry(800, 800), {
        textureWidth: Math.min(1024, innerWidth) * 1.5, textureHeight: Math.min(1024, innerHeight) * 1.5,
        color: 0x4a4660,
      });
      mirror.rotation.x = -Math.PI / 2; mirror.position.y = 0.01; scene.add(mirror);
      // dark wet sheen over the reflection so it's subtle, not a clean mirror
      const wet = new THREE.Mesh(new THREE.PlaneGeometry(800, 800),
        new THREE.MeshStandardMaterial({ color: 0x06040e, metalness: 0.9, roughness: 0.55, transparent: true, opacity: 0.62 }));
      wet.rotation.x = -Math.PI / 2; wet.position.y = 0.02; scene.add(wet);
      const grid = new THREE.GridHelper(800, 160, 0x9b4dff, 0x1d1438);
      grid.material.transparent = true; grid.material.opacity = 0.18; grid.position.y = 0.03; scene.add(grid);

      // window texture for generic buildings
      function windowTex(tint) {
        const cv = document.createElement("canvas"); cv.width = 32; cv.height = 64;
        const x = cv.getContext("2d");
        x.fillStyle = "#070411"; x.fillRect(0, 0, 32, 64);
        for (let yy = 4; yy < 64; yy += 6) for (let xx = 4; xx < 32; xx += 7) {
          if (Math.random() < 0.45) { x.fillStyle = tint; x.globalAlpha = 0.5 + Math.random() * 0.5; x.fillRect(xx, yy, 4, 4); }
        }
        x.globalAlpha = 1;
        const t = new THREE.CanvasTexture(cv); t.wrapS = t.wrapT = THREE.RepeatWrapping; return t;
      }
      const tints = ["#19e0ff", "#ff3df0", "#9b4dff", "#ffd84d", "#7fd4ff"];

      // generic skyline
      const cityGroup = new THREE.Group(); scene.add(cityGroup);
      const span = 14, step = 11;
      for (let i = -span; i <= span; i++) for (let j = -span; j <= span; j++) {
        const r = Math.hypot(i, j);
        if (r < 4.2) continue;                       // big plaza so the nav ring reads
        if (Math.random() < 0.18) continue;          // streets / gaps
        const h = 6 + Math.random() * (r > 7 ? 26 : 14);
        const w = 4 + Math.random() * 3;
        const tint = tints[(Math.random() * tints.length) | 0];
        const tex = windowTex(tint);
        tex.repeat.set(Math.max(1, w / 3), Math.max(1, h / 4));
        const mat = new THREE.MeshStandardMaterial({ color: 0x0c0820, emissive: new THREE.Color(tint), emissiveMap: tex, emissiveIntensity: 0.7, metalness: 0.5, roughness: 0.6 });
        const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, w), mat);
        b.position.set(i * step + (Math.random() - 0.5) * 3, h / 2, j * step + (Math.random() - 0.5) * 3);
        cityGroup.add(b);
      }

      // neon sign sprite
      function makeSign(text, sub, colorHex) {
        const cv = document.createElement("canvas"); cv.width = 512; cv.height = 160;
        const x = cv.getContext("2d");
        x.clearRect(0, 0, 512, 160);
        const col = "#" + colorHex.toString(16).padStart(6, "0");
        // panel
        x.fillStyle = "rgba(8,4,18,0.82)"; roundRect(x, 16, 16, 480, 128, 22); x.fill();
        x.lineWidth = 4; x.strokeStyle = col; x.shadowColor = col; x.shadowBlur = 26; roundRect(x, 16, 16, 480, 128, 22); x.stroke();
        x.shadowBlur = 18; x.fillStyle = "#fff"; x.textAlign = "center";
        x.font = "900 62px Orbitron, sans-serif"; x.fillText(text, 256, 84);
        x.shadowBlur = 0; x.fillStyle = col; x.font = "600 26px Rajdhani, sans-serif"; x.fillText(sub.toUpperCase(), 256, 124);
        const tex = new THREE.CanvasTexture(cv);
        const sp = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true, depthWrite: false }));
        sp.scale.set(16, 5, 1); return sp;
      }
      function roundRect(x, a, b, w, h, r) { x.beginPath(); x.moveTo(a + r, b); x.arcTo(a + w, b, a + w, b + h, r); x.arcTo(a + w, b + h, a, b + h, r); x.arcTo(a, b + h, a, b, r); x.arcTo(a, b, a + w, b, r); x.closePath(); }

      // landmark towers (the nav)
      const clickable = [];
      const ringR = 30;
      NAV.forEach((n, k) => {
        const ang = (k / NAV.length) * Math.PI * 2;
        const px = Math.cos(ang) * ringR, pz = Math.sin(ang) * ringR;
        const h = 30 + (k % 3) * 6;
        const col = new THREE.Color(n.color);
        const tex = windowTex("#" + n.color.toString(16).padStart(6, "0")); tex.repeat.set(2, h / 4);
        const mat = new THREE.MeshStandardMaterial({ color: 0x0b0820, emissive: col, emissiveMap: tex, emissiveIntensity: 0.9, metalness: 0.6, roughness: 0.45 });
        const tower = new THREE.Mesh(new THREE.BoxGeometry(7, h, 7), mat);
        tower.position.set(px, h / 2, pz);
        tower.userData = { url: n.url, name: n.name, base: 0.9, mat };
        scene.add(tower); clickable.push(tower);
        // glowing roof cap
        const cap = new THREE.Mesh(new THREE.BoxGeometry(7.4, 1.2, 7.4), new THREE.MeshBasicMaterial({ color: col }));
        cap.position.set(px, h + 0.6, pz); scene.add(cap);
        // sign above
        const sign = makeSign(n.name, n.sub, n.color);
        sign.position.set(px, h + 7, pz); scene.add(sign);
        tower.userData.sign = sign;
        // beam
        const beam = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 60, 6), new THREE.MeshBasicMaterial({ color: col, transparent: true, opacity: 0.25 }));
        beam.position.set(px, h + 30, pz); scene.add(beam);
      });

      // central CATBOY beacon
      const beaconMat = new THREE.MeshStandardMaterial({ color: 0x120a26, emissive: new THREE.Color(0x9b4dff), emissiveIntensity: 1.1, metalness: 0.7, roughness: 0.3 });
      const beacon = new THREE.Mesh(new THREE.CylinderGeometry(3.4, 4.2, 46, 8), beaconMat);
      beacon.position.set(0, 23, 0); scene.add(beacon);
      const catSign = makeSign("$CATBOY", "the legend evolves", 0xff3df0);
      catSign.scale.set(22, 7, 1); catSign.position.set(0, 54, 0); scene.add(catSign);
      const solSprite = (() => {
        const cv = document.createElement("canvas"); cv.width = 128; cv.height = 128; const x = cv.getContext("2d");
        const img = new Image(); img.src = "assets/solana.png"; img.onload = () => { x.drawImage(img, 0, 0, 128, 128); tex.needsUpdate = true; };
        const tex = new THREE.CanvasTexture(cv);
        const s = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex, transparent: true })); s.scale.set(7, 7, 1); s.position.set(0, 47, 0); return s;
      })();
      scene.add(solSprite);

      // stars
      const starGeo = new THREE.BufferGeometry();
      const sv = [];
      for (let i = 0; i < 1200; i++) { const rr = 180 + Math.random() * 120, th = Math.random() * Math.PI * 2, ph = Math.random() * Math.PI * 0.5; sv.push(Math.cos(th) * rr, 40 + Math.sin(ph) * 140, Math.sin(th) * rr); }
      starGeo.setAttribute("position", new THREE.Float32BufferAttribute(sv, 3));
      scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xbfa8ff, size: 0.7, transparent: true, opacity: 0.8 })));

      // flying cars
      const cars = [];
      for (let i = 0; i < 16; i++) {
        const col = new THREE.Color(tints[(Math.random() * tints.length) | 0]);
        const car = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.3, 0.3), new THREE.MeshBasicMaterial({ color: col }));
        const y = 10 + Math.random() * 26, rad = 40 + Math.random() * 90, sp = (0.2 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1);
        car.userData = { y, rad, sp, a: Math.random() * Math.PI * 2 };
        scene.add(car); cars.push(car);
      }

      // rain — thin neon streaks (broke-Matrix drizzle)
      const RN = 2600;
      const rainGeo = new THREE.BufferGeometry();
      const rp = new Float32Array(RN * 6), rspd = new Float32Array(RN);
      for (let i = 0; i < RN; i++) {
        const x = (Math.random() - 0.5) * 320, z = (Math.random() - 0.5) * 320, y = Math.random() * 160;
        const len = 2.2 + Math.random() * 3.5;
        rp[i * 6] = x; rp[i * 6 + 1] = y; rp[i * 6 + 2] = z;
        rp[i * 6 + 3] = x; rp[i * 6 + 4] = y - len; rp[i * 6 + 5] = z;
        rspd[i] = 0.7 + Math.random() * 1.4;
      }
      rainGeo.setAttribute("position", new THREE.BufferAttribute(rp, 3));
      const rain = new THREE.LineSegments(rainGeo, new THREE.LineBasicMaterial({ color: 0x8fe6ff, transparent: true, opacity: 0.28, blending: THREE.AdditiveBlending }));
      scene.add(rain);
      function stepRain(dt) {
        const p = rainGeo.attributes.position.array;
        for (let i = 0; i < RN; i++) {
          const d = rspd[i] * dt * 60;
          p[i * 6 + 1] -= d; p[i * 6 + 4] -= d;
          if (p[i * 6 + 4] < 0) { const ny = 120 + Math.random() * 40, len = p[i * 6 + 1] - p[i * 6 + 4]; p[i * 6 + 1] = ny; p[i * 6 + 4] = ny - len; }
        }
        rainGeo.attributes.position.needsUpdate = true;
      }

      // bloom post-processing — the neon glow
      const composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));
      const bloom = new UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 0.9, 0.7, 0.18);
      composer.addPass(bloom);

      // interaction
      const ray = new THREE.Raycaster(), pointer = new THREE.Vector2();
      let hovered = null;
      const hoverEl = document.getElementById("hover");
      function setPointer(e) { const t = e.touches ? e.touches[0] : e; pointer.x = (t.clientX / innerWidth) * 2 - 1; pointer.y = -(t.clientY / innerHeight) * 2 + 1; }
      function pick() { ray.setFromCamera(pointer, camera); const hit = ray.intersectObjects(clickable, false)[0]; return hit ? hit.object : null; }
      renderer.domElement.addEventListener("pointermove", (e) => { setPointer(e); });
      let downXY = null;
      renderer.domElement.addEventListener("pointerdown", (e) => { downXY = [e.clientX, e.clientY]; });
      renderer.domElement.addEventListener("pointerup", (e) => {
        if (!downXY) return; const moved = Math.hypot(e.clientX - downXY[0], e.clientY - downXY[1]); downXY = null;
        if (moved > 8) return; // was a drag
        setPointer(e); const o = pick(); if (o) { document.getElementById("load").classList.remove("gone"); location.href = o.userData.url; }
      });

      addEventListener("resize", () => { camera.aspect = innerWidth / innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); composer.setSize(innerWidth, innerHeight); });

      const clock = new THREE.Clock();
      function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        controls.update();
        // hover
        const o = pick();
        if (o !== hovered) {
          if (hovered) { hovered.userData.mat.emissiveIntensity = hovered.userData.base; hovered.userData.sign.scale.set(16, 5, 1); }
          hovered = o;
          if (hovered) {
            hoverEl.textContent = "Enter " + hovered.userData.name;
            hoverEl.style.color = "#" + hovered.material.emissive.getHexString();
            hoverEl.style.opacity = 1; document.body.style.cursor = "pointer";
          } else { hoverEl.style.opacity = 0; document.body.style.cursor = "default"; }
        }
        if (hovered) { hovered.userData.mat.emissiveIntensity = 1.4 + Math.sin(t * 6) * 0.3; const s = hovered.userData.sign; s.scale.set(18, 5.6, 1); }
        // cars
        cars.forEach((c) => { c.userData.a += c.userData.sp * 0.01; c.position.set(Math.cos(c.userData.a) * c.userData.rad, c.userData.y, Math.sin(c.userData.a) * c.userData.rad); c.rotation.y = -c.userData.a; });
        beacon.rotation.y = t * 0.2;
        stepRain(1 / 60);
        composer.render();
      }
      animate();
      setTimeout(() => document.getElementById("load").classList.add("gone"), 400);
    } catch (e) { fail(e); }
  </script>
</body>
</html>
