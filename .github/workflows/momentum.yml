name: momentum
on:
  # schedule:  # SILENCED (cron off; manual dispatch still works)
    # - cron: '*/5 * * * *'   # every 5 min — track trend exits + hunt fresh momentum
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: momentum
  cancel-in-progress: false
jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: restore bankroll + positions
        uses: actions/cache@v4
        with:
          path: momentum/.state.json
          key: momentum-${{ github.run_id }}
          restore-keys: momentum-
      - name: run momentum
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: '6820752140'
          DRY_RUN: '1'            # PAPER. Set to '0' only after a verified router+quoter+burner is wired.
          STATE_FILE: momentum/.state.json
        run: node momentum/index.mjs
