name: copytrade
on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min — catch alpha-wallet buys fast
  workflow_dispatch: {}
permissions:
  contents: read
concurrency:
  group: copytrade
  cancel-in-progress: false
jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: restore seen list
        uses: actions/cache@v4
        with:
          path: copytrade/.seen.json
          key: copytrade-${{ github.run_id }}
          restore-keys: copytrade-
      - name: watch alpha wallets
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: '6820752140'
          STATE_FILE: copytrade/.seen.json
        run: node copytrade/index.mjs
