name: Deploy to droplet

# Auto-deploy: every push to main SSHes into the droplet, pulls the latest
# code, and reloads all pm2 processes (bots). Also runnable on demand from the
# Actions tab ("Run workflow") — works from the GitHub mobile site too.
# Manual-only for now: the droplet has password SSH disabled (key-only), so
# auto-deploy needs an SSH deploy key in DROPLET_SSH_KEY before re-enabling the
# push trigger. Until then, deploy from the droplet console with:
#   cd ~/catboy && git pull origin main && pm2 reload all
on:
  workflow_dispatch: {}

concurrency:
  group: droplet-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check secrets are present (no values printed)
        env:
          H: ${{ secrets.DROPLET_HOST }}
          U: ${{ secrets.DROPLET_USER }}
          P: ${{ secrets.DROPLET_SSH_PASSWORD || secrets.DROPLET_PASSWORD || secrets.ROOT_PASSWORD || secrets.SSH_PASSWORD || secrets.PASSWORD || secrets.ROOT }}
        run: |
          echo "host set:     $([ -n "$H" ] && echo yes || echo NO)"
          echo "user set:     $([ -n "$U" ] && echo "yes ($U)" || echo NO)"
          echo "password len: ${#P}  (0 = no matching password secret found)"
      - name: SSH deploy (pull + reload bots)
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USER || 'root' }}
          # Accept whatever the password secret was named (mobile setup guesswork).
          password: ${{ secrets.DROPLET_SSH_PASSWORD || secrets.DROPLET_PASSWORD || secrets.ROOT_PASSWORD || secrets.SSH_PASSWORD || secrets.PASSWORD || secrets.ROOT }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          port: ${{ secrets.DROPLET_PORT || 22 }}
          script: |
            set -e
            cd ~/catboy
            git fetch origin main
            git reset --hard origin/main
            # reload keeps processes up with zero downtime; falls back to start
            pm2 reload all || pm2 restart all
            pm2 save
            echo "deployed $(git rev-parse --short HEAD)"
