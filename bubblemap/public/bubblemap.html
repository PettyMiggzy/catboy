<style>
  :root{
    --bg:#080b08; --bg2:#0d120d; --panel:#111811; --panel2:#161e16;

  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:
      radial-gradient(1200px 700px at 72% -10%, #0f1a0d 0%, transparent 60%),
      radial-gradient(900px 600px at 8% 110%, #10160f 0%, transparent 55%),
      var(--bg);
    color:var(--ink); font-family:var(--sans);
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    display:flex; align-items:baseline; gap:18px; flex-wrap:wrap;
    padding:14px 20px 12px; border-bottom:1px solid var(--line);
    background:linear-gradient(180deg,rgba(158,244,24,.05),transparent);
  }
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-size:15px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;margin:0}
  .brand h1 b{color:var(--acc)}
  .brand .chain{font:600 10px/1 var(--mono);letter-spacing:.18em;text-transform:uppercase;color:var(--mut);
    border:1px solid var(--line);border-radius:999px;padding:5px 9px}
  .stats{display:flex;gap:22px;margin-left:auto;flex-wrap:wrap}
  .stat{display:flex;flex-direction:column;gap:2px}
  .stat .v{font:650 16px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--ink)}
  .stat .v.hot{color:var(--gold)}
  .stat .k{font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--dim)}
  main{flex:1;display:flex;min-height:0}
  .stage{position:relative;flex:1;min-width:0}
  canvas{display:block;width:100%;height:100%}
  .side{
    width:288px;flex:none;border-left:1px solid var(--line);background:var(--panel);
    display:flex;flex-direction:column;overflow-y:auto;
  }
  .side section{padding:14px 16px;border-bottom:1px solid var(--line)}
  .side h2{margin:0 0 10px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);font-weight:700}
  .row{display:flex;align-items:center;gap:9px;padding:5px 0;font-size:12px}
  .row .sw{width:9px;height:9px;border-radius:50%;flex:none}
  .row .ad{font:500 11.5px/1 var(--mono);color:var(--ink);cursor:pointer}
  .row .ad:hover{color:var(--acc)}
  .row .pc{margin-left:auto;font:600 12px/1 var(--mono);font-variant-numeric:tabular-nums;color:var(--mut)}
  .row .pc b{color:var(--gold)}
  .legend .row{cursor:default}
  .legend .lab{color:var(--mut);font-size:11.5px}
  .bundle{border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:8px;background:var(--panel2)}
  .bundle .bh{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--mut);margin-bottom:5px}
  .bundle .bh .dot{width:8px;height:8px;border-radius:50%}
  .bundle .bh b{color:var(--ink);font-family:var(--mono)}
  .bundle .members{display:flex;flex-wrap:wrap;gap:4px}
  .bundle .members span{font:500 10px/1 var(--mono);color:var(--mut);background:#0d130d;border:1px solid var(--line);
    border-radius:4px;padding:3px 5px;cursor:pointer}
  .bundle .members span:hover{color:var(--acc);border-color:var(--acc-dim)}
  .note{font-size:11px;color:var(--dim);line-height:1.5}
  .note b{color:var(--mut)}
  #tip{
    position:absolute;pointer-events:none;opacity:0;transform:translateY(4px);
    transition:opacity .12s,transform .12s;z-index:5;
    background:rgba(9,13,9,.96);border:1px solid var(--acc-dim);border-radius:9px;
    padding:9px 11px;min-width:190px;box-shadow:0 12px 34px rgba(0,0,0,.55);
  }
  #tip .t-ad{font:600 11.5px/1.3 var(--mono);color:var(--acc);word-break:break-all;margin-bottom:6px}
  #tip .t-g{display:grid;grid-template-columns:auto auto;gap:2px 14px}
  #tip .t-g .k{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em}
  #tip .t-g .v{font:600 11.5px/1.3 var(--mono);color:var(--ink);text-align:right;font-variant-numeric:tabular-nums}
  #tip .t-tag{margin-top:6px;font:600 10px/1 var(--mono);letter-spacing:.08em;text-transform:uppercase}
  .foot{position:absolute;left:14px;bottom:12px;font:500 10.5px/1.5 var(--mono);color:var(--dim);z-index:4}
  .foot b{color:var(--acc-dim)}
  .hint{position:absolute;right:14px;bottom:12px;font-size:10.5px;color:var(--dim);z-index:4}
  @media (max-width:760px){ .side{display:none} }
</style>

const CL = ['#9ef418','#f5b301','#ff6ec7','#4ea8ff','#ff8a3d','#b98cff'];
const clusterColor = c => c>0 ? CL[((c-1)%(CL.length-1))+1] : '#6f8069';
const short = a => a.slice(0,6)+'…'+a.slice(-4);
const fmtPct = p => p>=1 ? p.toFixed(2) : p.toFixed(3);

// ---- derive view model ----
const nodes = GRAPH.nodes.map(n=>({...n}));
const byId = new Map(nodes.map(n=>[n.id,n]));
const edges = GRAPH.edges.filter(e=>byId.has(e.from)&&byId.has(e.to))
  .map(e=>({s:byId.get(e.from),t:byId.get(e.to),count:e.count}));
const maxPct = Math.max(...nodes.map(n=>n.pct));
const radius = n => Math.max(4.5, Math.min(46, Math.sqrt(n.pct)* (46/Math.sqrt(maxPct)) ));
nodes.forEach(n=>{ n.r=radius(n);
  n.kind = n.tag==='burn'?'burn' : n.tag==='LP Pool'?'pool' : n.pct>=5?'whale' : n.cluster>0?'cluster':'base';
});
const degree = new Map(); edges.forEach(e=>{degree.set(e.s.id,(degree.get(e.s.id)||0)+1);degree.set(e.t.id,(degree.get(e.t.id)||0)+1);});

// ---- header stats ----
const S = GRAPH.token;
document.getElementById('stats').innerHTML = [
  ['Holders', S.holders],
  ['Transfers', GRAPH.transfers],
  ['Wallets mapped', nodes.length],
  ['Bundles', GRAPH.clusters],
  ['Top holder', fmtPct(maxPct)+'%', true],
].map(([k,v,hot])=>`<div class="stat"><span class="v ${hot?'hot':''}">${v}</span><span class="k">${k}</span></div>`).join('');

// ---- top holders ----
const tops=[...nodes].sort((a,b)=>b.pct-a.pct).slice(0,8);
document.getElementById('top').innerHTML = tops.map(n=>{
  const col=n.kind==='pool'?'var(--teal)':n.kind==='whale'?'var(--gold)':clusterColor(n.cluster);
  const tag=n.tag?` · ${n.tag}`:'';
  return `<div class="row"><span class="sw" style="background:${col}"></span>
    <span class="ad" data-a="${n.id}">${short(n.id)}${tag}</span>
    <span class="pc">${n.pct>=5?'<b>':''}${fmtPct(n.pct)}%${n.pct>=5?'</b>':''}</span></div>`;
}).join('');

// ---- bundles ----
const groups={};
nodes.forEach(n=>{ if(n.cluster>0){ (groups[n.cluster]=groups[n.cluster]||[]).push(n);} });
document.getElementById('bundles').innerHTML = Object.entries(groups)
  .sort((a,b)=>b[1].length-a[1].length).map(([c,ms])=>{
  const col=clusterColor(+c);
  const blk=ms[0].firstBlock;
  return `<div class="bundle"><div class="bh"><span class="dot" style="background:${col}"></span>
    <span>block <b>${blk}</b></span><span style="margin-left:auto">${ms.length} wallets</span></div>
    <div class="members">${ms.map(m=>`<span data-a="${m.id}">${short(m.id)}</span>`).join('')}</div></div>`;
}).join('') || '<div class="note">No same-block clusters detected.</div>';

// ---- legend ----
document.getElementById('legend').innerHTML = [
  ['var(--gold)','Whale (≥5% of supply)'],
  ['var(--teal)','LP pool'],
  ['#f5b301','Same-block cluster'],
  ['#6f8069','Independent holder'],
].map(([c,l])=>`<div class="row"><span class="sw" style="background:${c}"></span><span class="lab">${l}</span></div>`).join('');

// ---- force simulation (vanilla, ~85 nodes) ----
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W,H,DPR;
function resize(){ const b=cv.getBoundingClientRect(); DPR=Math.min(2,devicePixelRatio||1);
  W=b.width; H=b.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0); }
new ResizeObserver(resize).observe(cv); resize();
nodes.forEach((n,i)=>{ const a=i/nodes.length*Math.PI*2, rr=Math.min(W,H)*0.3;
  n.x=W/2+Math.cos(a)*rr*(0.5+Math.random()*0.5); n.y=H/2+Math.sin(a)*rr*(0.5+Math.random()*0.5); n.vx=0; n.vy=0; });
let alpha=1, hover=null, sel=null, drag=null;
function tick(){
  const cx=W/2, cy=H/2;
  for(const n of nodes){ n.vx+=(cx-n.x)*0.0016*alpha; n.vy+=(cy-n.y)*0.0016*alpha; }
  for(let i=0;i<nodes.length;i++){ const a=nodes[i];
    for(let j=i+1;j<nodes.length;j++){ const b=nodes[j];
      let dx=a.x-b.x, dy=a.y-b.y, d2=dx*dx+dy*dy||0.01, d=Math.sqrt(d2);
      const min=a.r+b.r+6, rep=(2200*alpha)/d2;
      let f=rep; if(d<min) f+=(min-d)*0.9/d;
      const ux=dx/d, uy=dy/d; a.vx+=ux*f; a.vy+=uy*f; b.vx-=ux*f; b.vy-=uy*f;
    }
  }
  for(const e of edges){ const dx=e.t.x-e.s.x, dy=e.t.y-e.s.y, d=Math.hypot(dx,dy)||1;
    const tgt=90+e.s.r+e.t.r, f=(d-tgt)*0.008*alpha, ux=dx/d, uy=dy/d;
    e.s.vx+=ux*f; e.s.vy+=uy*f; e.t.vx-=ux*f; e.t.vy-=uy*f;
  }
  for(const n of nodes){ if(n===drag) continue;
    n.vx*=0.86; n.vy*=0.86; n.x+=n.vx; n.y+=n.vy;
    n.x=Math.max(n.r+4,Math.min(W-n.r-4,n.x)); n.y=Math.max(n.r+4,Math.min(H-n.r-4,n.y));
  }
  if(alpha>0.02) alpha*=0.992;
}
function neighbors(n){ const s=new Set([n.id]); edges.forEach(e=>{ if(e.s===n)s.add(e.t.id); if(e.t===n)s.add(e.s.id);}); return s; }
function draw(){
  ctx.clearRect(0,0,W,H);
  const focus = sel||hover;
  const nb = focus? neighbors(focus): null;
  // edges
  for(const e of edges){
    const on = focus && (e.s===focus||e.t===focus);
    ctx.strokeStyle = on? 'rgba(158,244,24,.55)' : focus? 'rgba(120,140,120,.05)':'rgba(120,140,120,.13)';
    ctx.lineWidth = on? 1.4:0.7;
    ctx.beginPath(); ctx.moveTo(e.s.x,e.s.y); ctx.lineTo(e.t.x,e.t.y); ctx.stroke();
  }
  // nodes
  for(const n of nodes){
    const dim = focus && nb && !nb.has(n.id);
    const col = n.kind==='pool'?'#37d6c4' : n.kind==='burn'?'#3d463c' : clusterColor(n.cluster);
    ctx.globalAlpha = dim?0.18:1;
    if(n.cluster>0 && !dim){ ctx.shadowColor=col; ctx.shadowBlur=12; } else ctx.shadowBlur=0;
    ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,7); ctx.fillStyle=col; ctx.fill();
    ctx.shadowBlur=0;
    if(n.kind==='whale'){ ctx.lineWidth=2.5; ctx.strokeStyle='#f5b301'; ctx.stroke(); }
    if(n===focus){ ctx.lineWidth=2; ctx.strokeStyle='#e9f1e6'; ctx.stroke(); }
  }
  ctx.globalAlpha=1;
}
function loop(){ tick(); draw(); requestAnimationFrame(loop); } loop();

// ---- interaction ----
const tip=document.getElementById('tip');
function at(mx,my){ let best=null,bd=1e9; for(const n of nodes){ const d=Math.hypot(n.x-mx,n.y-my); if(d<n.r+4&&d<bd){bd=d;best=n;} } return best; }
function showTip(n,mx,my){
  const col=n.kind==='pool'?'var(--teal)':n.kind==='whale'?'var(--gold)':clusterColor(n.cluster);
  const tagTxt = n.tag||(n.cluster>0?'Same-block cluster':'Independent holder');
  tip.innerHTML=`<div class="t-ad">${n.id}</div>
    <div class="t-g">
      <span class="k">Supply</span><span class="v" style="color:${n.pct>=5?'var(--gold)':'var(--ink)'}">${fmtPct(n.pct)}%</span>
      <span class="k">First block</span><span class="v">${n.firstBlock??'—'}</span>
      <span class="k">Connections</span><span class="v">${degree.get(n.id)||0}</span>
    </div>
    <div class="t-tag" style="color:${col}">${tagTxt}</div>`;
  const b=cv.getBoundingClientRect();
  let x=mx+16, y=my+14; if(x> b.width-210) x=mx-206; if(y>b.height-96) y=my-96;
  tip.style.left=x+'px'; tip.style.top=y+'px'; tip.style.opacity=1; tip.style.transform='translateY(0)';
}
cv.addEventListener('mousemove',ev=>{
  const b=cv.getBoundingClientRect(), mx=ev.clientX-b.left, my=ev.clientY-b.top;
  if(drag){ drag.x=mx; drag.y=my; drag.vx=0; drag.vy=0; return; }
  const n=at(mx,my); hover=n; cv.style.cursor=n?'pointer':'default';
  if(n) showTip(n,mx,my); else { tip.style.opacity=0; tip.style.transform='translateY(4px)'; }
});
cv.addEventListener('mousedown',ev=>{ const b=cv.getBoundingClientRect(); const n=at(ev.clientX-b.left,ev.clientY-b.top);
  if(n){ drag=n; sel=(sel===n?null:n); alpha=Math.max(alpha,.4);} else sel=null; });
window.addEventListener('mouseup',()=>drag=null);
cv.addEventListener('mouseleave',()=>{hover=null;tip.style.opacity=0;});
// side-panel address hover/click -> focus node
document.querySelectorAll('[data-a]').forEach(el=>{
  el.addEventListener('mouseenter',()=>{ hover=byId.get(el.dataset.a); });
  el.addEventListener('mouseleave',()=>{ hover=null; });
  el.addEventListener('click',()=>{ const n=byId.get(el.dataset.a); sel=(sel===n?null:n); alpha=Math.max(alpha,.4); });
});
</script>
